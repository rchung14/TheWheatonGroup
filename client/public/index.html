    <!-- Description, canonical, and Open Graph tags are set per-route by the
         Seo component (react-helmet-async) - don't hardcode them here, or
         every route would carry the homepage's tags. -->

    <link rel="manifest" href="/manifest.json">
    <!-- Self-hosted variable fonts (latin subset) - no render-blocking
         fonts.googleapis.com CSS request, no third-party connection setup. -->
    <link rel="preload" href="/assets/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/playfair-display-latin-var.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 700;
        font-display: optional;
        src: url('/assets/fonts/inter-latin-var.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Playfair Display';
        font-style: normal;
        font-weight: 400 900;
        font-display: optional;
        src: url('/assets/fonts/playfair-display-latin-var.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      /* Metric-matched fallbacks (computed from the font files with
         frequency-weighted advance widths). Combined with font-display:
         optional above: if a webfont misses the ~100ms block window, text
         renders once in a fallback that occupies identical space - no swap
         repaint (which would push text LCP late) and no layout shift. */
      @font-face {
        font-family: 'Inter Fallback';
        src: local('Arial');
        size-adjust: 107.33%;
        ascent-override: 90.26%;
        descent-override: 22.47%;
        line-gap-override: 0%;
      }
      @font-face {
        font-family: 'Playfair Display Fallback';
        src: local('Georgia');
        size-adjust: 102.38%;
        ascent-override: 105.69%;
        descent-override: 24.52%;
        line-gap-override: 0%;
      }
    </style>
